<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Fueling Calculator</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>
  <main class="container">
    <h1>Daily Fueling Calculator</h1>

    <section class="card">
      <h2>Constants</h2>
      <div class="grid">
        <label>BMR
          <input id="bmr" type="number" value="1750"/>
        </label>
        <label>Run kcal per mile
          <input id="kcalPerMile" type="number" value="100"/>
        </label>
        <label>Surplus
          <input id="surplus" type="number" value="300"/>
        </label>
      </div>
    </section>

    <section class="card">
      <h2>Today</h2>
      <div class="grid">
        <label>Bodyweight (lb)
          <input id="bw" type="number" value="147"/>
        </label>
        <label>Run miles
          <input id="miles" type="number" step="0.1" value="0"/>
        </label>
        <label>Non-Run Steps (NEAT only)
          <input id="neatSteps" type="number" value="10000"/>
        </label>
        <label>Lifting kcal
          <input id="liftCals" type="number" value="350"/>
        </label>
      </div>
    </section>

    <section class="card">
      <h2>Results</h2>
      <div id="results"></div>
    </section>
  </main>

<script src="app.js"></script>
</body>
</html>
